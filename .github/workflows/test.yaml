name: "CI - Test Features"
on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      cargo-lambda: ${{ steps.filter.outputs.cargo-lambda }}
      lambroll: ${{ steps.filter.outputs.lambroll }}
      ngrok: ${{ steps.filter.outputs.ngrok }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            cargo-lambda:
              - 'src/cargo-lambda/**'
              - 'test/cargo-lambda/**'
            lambroll:
              - 'src/lambroll/**'
              - 'test/lambroll/**'
            ngrok:
              - 'src/ngrok/**'
              - 'test/ngrok/**'

  test-autogenerated-cargo-lambda:
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.cargo-lambda == 'true'
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      matrix:
        baseImage:
          - debian:latest
          - ubuntu:latest
    steps:
      - uses: actions/checkout@v4

      - name: "Install latest devcontainer CLI"
        run: npm install -g @devcontainers/cli

      - name: "Generating tests for 'cargo-lambda' against '${{ matrix.baseImage }}'"
        run: devcontainer features test --skip-scenarios -f cargo-lambda -i ${{ matrix.baseImage }} .

  test-autogenerated-lambroll:
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.lambroll == 'true'
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      matrix:
        baseImage:
          - debian:latest
          - ubuntu:latest
    steps:
      - uses: actions/checkout@v4

      - name: "Install latest devcontainer CLI"
        run: npm install -g @devcontainers/cli

      - name: "Generating tests for 'lambroll' against '${{ matrix.baseImage }}'"
        run: devcontainer features test --skip-scenarios -f lambroll -i ${{ matrix.baseImage }} .

  test-autogenerated-ngrok:
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.ngrok == 'true'
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      matrix:
        baseImage:
          - debian:latest
          - ubuntu:latest
    steps:
      - uses: actions/checkout@v4

      - name: "Install latest devcontainer CLI"
        run: npm install -g @devcontainers/cli

      - name: "Generating tests for 'ngrok' against '${{ matrix.baseImage }}'"
        run: devcontainer features test --skip-scenarios -f ngrok -i ${{ matrix.baseImage }} .

  test-scenarios-cargo-lambda:
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.cargo-lambda == 'true'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: "Install latest devcontainer CLI"
        run: npm install -g @devcontainers/cli

      - name: "Generating tests for 'cargo-lambda' scenarios"
        run: devcontainer features test -f cargo-lambda --skip-autogenerated --skip-duplicated .

  test-scenarios-lambroll:
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.lambroll == 'true'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: "Install latest devcontainer CLI"
        run: npm install -g @devcontainers/cli

      - name: "Generating tests for 'lambroll' scenarios"
        run: devcontainer features test -f lambroll --skip-autogenerated --skip-duplicated .

  test-scenarios-ngrok:
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.ngrok == 'true'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: "Install latest devcontainer CLI"
        run: npm install -g @devcontainers/cli

      - name: "Generating tests for 'ngrok' scenarios"
        run: devcontainer features test -f ngrok --skip-autogenerated --skip-duplicated .

  test-global:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: "Install latest devcontainer CLI"
        run: npm install -g @devcontainers/cli

      - name: "Testing global scenarios"
        run: devcontainer features test --global-scenarios-only .
