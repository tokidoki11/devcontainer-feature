name: "CI - Test Features"
on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  compute-feature-matrix:
    runs-on: ubuntu-latest
    outputs:
      features: ${{ steps.compute.outputs.features }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            cargo-lambda:
              - 'src/cargo-lambda/**'
              - 'test/cargo-lambda/**'
            lambroll:
              - 'src/lambroll/**'
              - 'test/lambroll/**'
            ngrok:
              - 'src/ngrok/**'
              - 'test/ngrok/**'

      - name: "Compute features matrix"
        id: compute
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo 'features=["cargo-lambda","lambroll","ngrok"]' >> "$GITHUB_OUTPUT"
          else
            features=()
            [ "${{ steps.filter.outputs.cargo-lambda }}" = "true" ] && features+=("cargo-lambda")
            [ "${{ steps.filter.outputs.lambroll }}" = "true" ] && features+=("lambroll")
            [ "${{ steps.filter.outputs.ngrok }}" = "true" ] && features+=("ngrok")
            if [ ${#features[@]} -eq 0 ]; then
              echo 'features=[]' >> "$GITHUB_OUTPUT"
            else
              json=$(printf '%s\n' "${features[@]}" | jq -R . | jq -sc .)
              echo "features=$json" >> "$GITHUB_OUTPUT"
            fi
          fi

  test-autogenerated:
    needs: compute-feature-matrix
    if: needs.compute-feature-matrix.outputs.features != '[]' && needs.compute-feature-matrix.outputs.features != ''
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      matrix:
        features: ${{ fromJson(needs.compute-feature-matrix.outputs.features) }}
        baseImage:
          - debian:latest
          - ubuntu:latest
    steps:
      - uses: actions/checkout@v4

      - name: "Install latest devcontainer CLI"
        run: npm install -g @devcontainers/cli

      - name: "Generating tests for '${{ matrix.features }}' against '${{ matrix.baseImage }}'"
        run: devcontainer features test --skip-scenarios -f ${{ matrix.features }} -i ${{ matrix.baseImage }} .

  test-scenarios:
    needs: compute-feature-matrix
    if: needs.compute-feature-matrix.outputs.features != '[]' && needs.compute-feature-matrix.outputs.features != ''
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      matrix:
        features: ${{ fromJson(needs.compute-feature-matrix.outputs.features) }}
    steps:
      - uses: actions/checkout@v4

      - name: "Install latest devcontainer CLI"
        run: npm install -g @devcontainers/cli

      - name: "Generating tests for '${{ matrix.features }}' scenarios"
        run: devcontainer features test -f ${{ matrix.features }} --skip-autogenerated --skip-duplicated .

  test-global:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: "Install latest devcontainer CLI"
        run: npm install -g @devcontainers/cli

      - name: "Testing global scenarios"
        run: devcontainer features test --global-scenarios-only .
