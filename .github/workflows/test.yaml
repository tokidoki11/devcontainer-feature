name: "CI - Test Features"
on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      cargo-lambda: ${{ steps.filter.outputs.cargo-lambda }}
      lambroll: ${{ steps.filter.outputs.lambroll }}
      ngrok: ${{ steps.filter.outputs.ngrok }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            cargo-lambda:
              - 'src/cargo-lambda/**'
              - 'test/cargo-lambda/**'
            lambroll:
              - 'src/lambroll/**'
              - 'test/lambroll/**'
            ngrok:
              - 'src/ngrok/**'
              - 'test/ngrok/**'

  test-autogenerated:
    needs: changes
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      matrix:
        features:
          - cargo-lambda
          - lambroll
          - ngrok
        baseImage:
          - debian:latest
          - ubuntu:latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      (matrix.features == 'cargo-lambda' && needs.changes.outputs.cargo-lambda == 'true') ||
      (matrix.features == 'lambroll' && needs.changes.outputs.lambroll == 'true') ||
      (matrix.features == 'ngrok' && needs.changes.outputs.ngrok == 'true')
    steps:
      - uses: actions/checkout@v4

      - name: "Install latest devcontainer CLI"
        run: npm install -g @devcontainers/cli

      - name: "Generating tests for '${{ matrix.features }}' against '${{ matrix.baseImage }}'"
        run: devcontainer features test --skip-scenarios -f ${{ matrix.features }} -i ${{ matrix.baseImage }} .

  test-scenarios:
    needs: changes
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      matrix:
        features:
          - cargo-lambda
          - lambroll
          - ngrok
    if: |
      github.event_name == 'workflow_dispatch' ||
      (matrix.features == 'cargo-lambda' && needs.changes.outputs.cargo-lambda == 'true') ||
      (matrix.features == 'lambroll' && needs.changes.outputs.lambroll == 'true') ||
      (matrix.features == 'ngrok' && needs.changes.outputs.ngrok == 'true')
    steps:
      - uses: actions/checkout@v4

      - name: "Install latest devcontainer CLI"
        run: npm install -g @devcontainers/cli

      - name: "Generating tests for '${{ matrix.features }}' scenarios"
        run: devcontainer features test -f ${{ matrix.features }} --skip-autogenerated --skip-duplicated .

  test-global:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: "Install latest devcontainer CLI"
        run: npm install -g @devcontainers/cli

      - name: "Testing global scenarios"
        run: devcontainer features test --global-scenarios-only .
